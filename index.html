<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .status { color: var(--success); font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .label { color: #94a3b8; font-size: 14px; margin-bottom: 8px; }
        .value { font-family: monospace; background: #0f172a; padding: 12px; border-radius: 10px; word-break: break-all; border: 1px solid #334155; margin-bottom: 15px; font-size: 13px; }
        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin: 0;">Private IT Node</h2>
            <p class="status">● Протокол защиты активен</p>
        </div>
        
        <div class="card">
            <div class="label">Осталось дней защиты:</div>
            <div id="days" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">--</div>
            
            <div class="label">Персональный токен доступа:</div>
            <div id="key" class="value">Загрузка...</div>
            
            <button onclick="copyKey()">Скопировать токен</button>
        </div>
        
        <p style="font-size: 12px; color: #64748b; text-align: center;">
            Используйте данный токен в приложении-клиенте для установки защищенного соединения.
        </p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');
        const days = urlParams.get('days');

        if(key) document.getElementById('key').innerText = key;
        if(days) document.getElementById('days').innerText = days;

        function copyKey() {
            const el = document.createElement('textarea');
            el.value = key;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            tg.HapticFeedback.notificationOccurred('success');
            alert('Токен скопирован!');
        }
    </script>
</body>
</html>
