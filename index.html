<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
        .status { font-size: 12px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
        .status.active { color: var(--success); }
        .status.expired { color: var(--danger); }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .label { color: #94a3b8; }
        .token-box { background: #0f172a; border-radius: 16px; padding: 15px; font-size: 11px; color: var(--accent); word-break: break-all; margin: 20px 0; border: 1px solid rgba(56,189,248,0.2); font-family: monospace; }
        .btn { background: #0284c7; color: white; border: none; border-radius: 14px; padding: 16px; width: 100%; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-extend { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">PRIVATE IT NODE</div>
        <div class="card">
            <div id="statusDiv" class="status active">● СТАТУС: ПОДКЛЮЧЕНО</div>
            <div class="row"><span class="label">Баланс:</span><span id="balance">0₽</span></div>
            <div class="row"><span class="label">Осталось:</span><span id="days">--</span></div>
            
            <div class="token-box" id="token">Загрузка ключа...</div>
            
            <button class="btn" onclick="copy()">Скопировать ключ</button>
            <button class="btn btn-extend" id="extendBtn" onclick="extend()">Продлить подписку (250₽/мес)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);
        const balance = parseInt(params.get('balance') || '0');
        const days = parseInt(params.get('days') || '0');
        
        document.getElementById('token').innerText = decodeURIComponent(params.get('key') || '');
        document.getElementById('days').innerText = days + ' дн.';
        document.getElementById('balance').innerText = balance + '₽';

        if (days <= 0) {
            document.getElementById('statusDiv').innerHTML = "● СТАТУС: ИСТЕК";
            document.getElementById('statusDiv').className = "status expired";
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('token').innerText);
            tg.showAlert("Ключ скопирован! Вставьте его в приложение.");
        }

        function extend() {
            if (balance >= 250) {
                tg.sendData("extend_sub");
                tg.close();
            } else {
                tg.showAlert("Недостаточно средств. Пополните баланс в боте (минимум 250₽).");
            }
        }
    </script>
</body>
</html>
