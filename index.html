<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Slaver Game</title>
    <style>
        body { 
            background: #050505; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        #stats { font-size: 1.5rem; text-shadow: 0 0 10px #f00; margin-bottom: 20px; }
        
        #core-container { position: relative; width: 250px; height: 250px; }
        
        #core { 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, #ff0000 0%, #200000 80%); 
            border-radius: 50%; 
            box-shadow: 0 0 40px #f00; 
            cursor: pointer; 
            transition: transform 0.05s; 
            z-index: 2; 
            position: relative; 
        }
        
        #core:active { transform: scale(0.92); box-shadow: 0 0 70px #ff0000; }

        #win-screen { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            border: 2px solid #f00;
        }
        
        .btn { 
            background: #f00; 
            color: #fff; 
            border: none; 
            padding: 15px 30px; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .particle { position: absolute; background: #ff0000; width: 4px; height: 4px; pointer-events: none; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="stats">CAPTURED: <span id="score">0</span> / 1000 GB</div>
    
    <div id="core-container">
        <div id="core"></div>
    </div>
    
    <p style="margin-top: 30px; opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px;">PROTOCOL: INJECT_TRAFFIC</p>

    <div id="win-screen">
        <h1 style="color: #0f0; text-shadow: 0 0 10px #0f0;">CORE BREACHED!</h1>
        <p>Ваш секретный код для активации:</p>
        <h2 id="final-code" style="background: #222; padding: 15px; color: #fff; letter-spacing: 3px;"></h2>
        <p style="font-size: 0.8rem; padding: 0 20px;">Скопируй этот код и отправь его сообщением прямо в бота, чтобы получить очки и +24ч подписки!</p>
        <button class="btn" onclick="location.reload()">ВЗЛОМАТЬ СНОВА</button>
    </div>

    <script>
        let score = 0;
        const target = 1000;
        const core = document.getElementById('core');
        const scoreDisplay = document.getElementById('score');
        const winScreen = document.getElementById('win-screen');
        const finalCodeDisplay = document.getElementById('final-code');

        core.addEventListener('pointerdown', (e) => {
            score++;
            scoreDisplay.innerText = score;
            
            // Вибрация (если поддерживается)
            if (window.navigator.vibrate) window.navigator.vibrate(30);

            // Создание искр при тапе
            createParticle(e.clientX, e.clientY);

            // Проверка победы
            if (score >= target) {
                const secret = "CYBER_" + Math.random().toString(36).substring(2, 10).toUpperCase();
                finalCodeDisplay.innerText = secret;
                winScreen.style.display = 'flex';
            }
        });

        function createParticle(x, y) {
            for (let i = 0; i < 5; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 2;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;

                document.body.appendChild(p);

                let opacity = 1;
                const anim = setInterval(() => {
                    x += dx;
                    y += dy;
                    opacity -= 0.05;
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    p.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(anim);
                        p.remove();
                    }
                }, 20);
            }
        }
    </script>
</body>
</html>
