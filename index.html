<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private IT Node Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #0c4a6e 0%, var(--bg) 80%);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 440px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header {
            text-align: center;
            margin: 10px 0 25px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Главная карточка */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-badge.active { color: var(--success); border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-badge.expired { color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        .status-dot { width: 8px; height: 8px; background: currentColor; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* Сетка данных */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-item {
            background: rgba(15, 23, 42, 0.4);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .info-label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 18px; font-weight: 800; color: var(--text-main); }

        /* Поле ключа */
        .token-area {
            position: relative;
            background: #020617;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px dashed rgba(56, 189, 248, 0.4);
            cursor: pointer;
            transition: all 0.3s;
        }
        .token-area:active { transform: scale(0.98); background: #0f172a; }
        
        .token-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            word-break: break-all;
            display: block;
            opacity: 0.8;
        }

        /* Кнопки */
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:active { transform: translateY(2px); box-shadow: none; }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid rgba(148, 163, 184, 0.3);
            margin-top: 12px;
            padding: 14px;
            border-radius: 18px;
            width: 100%;
            font-weight: 600;
            font-size: 14px;
        }

        /* Инструкции */
        .setup-box { margin-top: 30px; }
        .setup-nav { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 14px; margin-bottom: 16px; }
        .nav-item {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            color: var(--text-dim);
            font-weight: 600;
            transition: 0.3s;
        }
        .nav-item.active { background: var(--accent); color: #000; }

        .setup-steps {
            font-size: 13px;
            color: var(--text-dim);
            background: rgba(15, 23, 42, 0.3);
            padding: 20px;
            border-radius: 20px;
            min-height: 120px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .setup-steps b { color: var(--text-main); }

        .footer-note {
            margin-top: 30px;
            font-size: 10px;
            text-align: center;
            color: #475569;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>PRIVATE IT NODE</h1>
    </header>

    <div class="main-card">
        <div id="statusBadge" class="status-badge active">
            <span class="status-dot"></span>
            <span id="statusText">Защита активна</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Баланс</span>
                <span id="balanceDisplay" class="info-value">0 ₽</span>
            </div>
            <div class="info-item">
                <span class="info-label">Осталось</span>
                <span id="daysDisplay" class="info-value">--</span>
            </div>
        </div>

        <div class="token-area" onclick="copyKey()">
            <span class="info-label" style="margin-bottom: 8px;">Ваш персональный ключ</span>
            <code class="token-text" id="vlessKey">vless://загрузка_данных...</code>
        </div>

        <button class="btn-primary" onclick="copyKey()" id="copyBtn">Скопировать доступ</button>
        <button class="btn-secondary" onclick="extendSub()">Продлить за 250₽</button>

        <div class="setup-box">
            <div class="setup-nav">
                <div class="nav-item active" onclick="setTab('ios', this)">iOS</div>
                <div class="nav-item" onclick="setTab('android', this)">Android</div>
                <div class="nav-item" onclick="setTab('pc', this)">Windows</div>
            </div>
            <div class="setup-steps" id="setupContent">
                </div>
        </div>
    </div>

    <div class="footer-note">
        🛡️ Сквозное шифрование. Мы не храним ваши логи.<br>
        v.2.0.4 IT Node Security
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#030712';

    // Парсинг данных из URL
    const params = new URLSearchParams(window.location.search);
    const balance = parseInt(params.get('balance') || '0');
    const days = parseInt(params.get('days') || '0');
    const key = decodeURIComponent(params.get('key') || 'Ключ не найден');

    // Отрисовка данных
    document.getElementById('balanceDisplay').innerText = balance + ' ₽';
    document.getElementById('daysDisplay').innerText = days + ' дн.';
    document.getElementById('vlessKey').innerText = key;

    if (days <= 0) {
        const badge = document.getElementById('statusBadge');
        badge.className = 'status-badge expired';
        document.getElementById('statusText').innerText = 'Доступ истек';
    }

    const guides = {
        ios: "1. Скачайте <b>V2Box</b> или <b>FoxRay</b> из App Store.<br>2. Нажмите кнопку <b>Скопировать доступ</b> выше.<br>3. В приложении нажмите <b>+</b> и выберите <b>Import from Clipboard</b>.",
        android: "1. Установите <b>v2rayNG</b> из Google Play.<br>2. Скопируйте ключ из этого меню.<br>3. В приложении нажмите <b>+</b> -> <b>Импорт из буфера</b>.",
        pc: "1. Используйте <b>v2rayN</b> (Windows).<br>2. Скопируйте ключ доступа.<br>3. В меню Servers выберите <b>Import v2ray link from clipboard</b>."
    };

    function setTab(platform, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('setupContent').innerHTML = guides[platform];
    }

    // Инициализация первой вкладки
    setTab('ios', document.querySelector('.nav-item'));

    function copyKey() {
        navigator.clipboard.writeText(key).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = '✅ Скопировано!';
            btn.style.background = '#22c55e';
            
            tg.HapticFeedback.notificationOccurred('success');

            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '';
            }, 2000);
        });
    }

    function extendSub() {
        if (balance >= 250) {
            tg.showConfirm("Списать 250₽ для продления на 30 дней?", (ok) => {
                if(ok) {
                    tg.sendData("extend_sub");
                    tg.close();
                }
            });
        } else {
            tg.showAlert("Недостаточно средств. Пополни баланс в основном меню бота.");
        }
    }
</script>

</body>
</html>
