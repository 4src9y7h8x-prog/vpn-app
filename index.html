<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .status { color: #22c55e; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .label { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .value { font-family: monospace; background: #0f172a; padding: 10px; border-radius: 10px; word-break: break-all; border: 1px solid #334155; margin-bottom: 15px; font-size: 12px; }
        .price-tag { display: flex; justify-content: space-between; background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed var(--accent); }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pay { background: #f8fafc; color: #0f172a; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Личный кабинет</h2>
        <div class="status">● Протокол защиты активен</div>
        
        <div class="card">
            <div class="label">Осталось дней:</div>
            <div id="days" style="font-size: 32px; font-weight: bold; margin-bottom: 20px;">0</div>
            
            <div class="label">Ваш токен:</div>
            <div id="key" class="value">Загрузка...</div>
            <button onclick="copyKey()">Скопировать токен</button>
        </div>

        <div class="card">
            <h3 style="margin-top: 0;">Продление доступа</h3>
            <div class="price-tag"><span>1 месяц</span> <b>250₽</b></div>
            <div class="price-tag"><span>3 месяца</span> <b>600₽ (выгода!)</b></div>
            <button class="btn-pay" onclick="pay()">Оплатить / Продлить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('key').innerText = urlParams.get('key') || 'Ошибка ключа';
        document.getElementById('days').innerText = urlParams.get('days') || '0';

        function copyKey() {
            navigator.clipboard.writeText(urlParams.get('key'));
            tg.HapticFeedback.notificationOccurred('success');
            alert('Токен скопирован!');
        }

        function pay() {
            tg.close(); // Закрываем приложение
            // Бот автоматически отправит сообщение в поддержку или на оплату
            window.location.href = "https://t.me/ProfitPicksNow"; 
        }
    </script>
</body>
</html>
