<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .label { color: #94a3b8; }
        .val { font-weight: 600; }
        .active { color: #22c55e; }
        .token-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            color: #38bdf8;
            border: 1px solid #334155;
            max-height: 100px;
            overflow-y: auto;
        }
        .btn {
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:active { background: #0369a1; }
        .footer { text-align: center; font-size: 12px; color: #64748b; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Личный кабинет</div>
        <div class="card">
            <div class="row">
                <span class="label">Статус:</span>
                <span class="val active">● Защита активна</span>
            </div>
            <div class="row">
                <span class="label">Ваш баланс:</span>
                <span class="val" id="balance">0₽</span>
            </div>
            <div class="row">
                <span class="label">Осталось дней:</span>
                <span class="val" id="days">--</span>
            </div>

            <div style="color: #94a3b8; font-size: 14px; margin-top: 20px;">Ваш токен доступа:</div>
            <div class="token-box" id="token">Загрузка...</div>

            <button class="btn" onclick="copy()">Скопировать токен</button>
        </div>
        <div class="footer">
            Используйте токен в приложении v2rayNG или FoXray для безопасного соединения.
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const params = new URLSearchParams(window.location.search);
        document.getElementById('token').innerText = decodeURIComponent(params.get('key') || 'Ошибка');
        document.getElementById('days').innerText = (params.get('days') || '0') + ' дн.';
        document.getElementById('balance').innerText = (params.get('balance') || '0') + '₽';

        function copy() {
            const t = document.getElementById('token').innerText;
            navigator.clipboard.writeText(t).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                alert('Токен скопирован!');
            });
        }
    </script>
</body>
</html>
