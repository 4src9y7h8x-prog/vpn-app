<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaver-Net Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #00ff00; text-align: center; padding: 20px; }
        .card { border: 1px solid #00ff00; padding: 15px; border-radius: 10px; background: #1a1a1a; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CYBER PANEL</h1>
        <p>Статус соединения: <span style="color: #fff;">ЗАЩИЩЕНО</span></p>
        <div id="user_info"></div>
        <br>
        <button onclick="Telegram.WebApp.close()">ВЕРНУТЬСЯ В БОТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        document.getElementById("user_info").innerText = "Логин: " + tg.initDataUnsafe.user.username;
    </script>
</body>
</html>
